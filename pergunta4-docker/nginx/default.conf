# Virtual host do ambiente de desenvolvimento.
# O nginx encaminha o PHP para o servico "php" (nome do container na rede).
server {
    listen 80;
    server_name localhost;

    root /var/www/html;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        include fastcgi_params;
        # "php" e o nome do servico no docker-compose; 9000 e a porta do fpm
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html$fastcgi_script_name;
    }
}
