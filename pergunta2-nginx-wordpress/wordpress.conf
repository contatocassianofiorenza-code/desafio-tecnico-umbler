# =============================================================================
# wordpress.conf - Virtual host Nginx para WordPress (borda) + LSPHP (worker)
# -----------------------------------------------------------------------------
# Arquitetura Configr: o Nginx fica na borda (recebe a requisicao, serve
# estatico, aplica cache e seguranca) e encaminha o PHP para o worker
# LiteSpeed/LSPHP (aqui exposto como PHP-FPM) via fastcgi.
# =============================================================================

# Zona de cache de pagina (full-page cache). Fica fora do server block.
# Guarda a resposta pronta em disco para nao reprocessar o PHP a cada acesso.
fastcgi_cache_path /var/cache/nginx/wordpress
                   levels=1:2
                   keys_zone=WORDPRESS:100m
                   inactive=60m
                   max_size=1g;

# chave que identifica cada resposta no cache
fastcgi_cache_key "$scheme$request_method$host$request_uri";

server {
    listen 80;
    server_name exemplo.com.br www.exemplo.com.br;

    root /var/www/exemplo/public_html;
    index index.php index.html;

    # --- Logs por site (facilita o troubleshooting em hospedagem) ------------
    access_log /var/log/nginx/exemplo_access.log;
    error_log  /var/log/nginx/exemplo_error.log;

    # --- Performance: compressao gzip para conteudo textual ------------------
    gzip on;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;

    # --- Performance: cache de estaticos no navegador ------------------------
    location ~* \.(jpg|jpeg|png|gif|webp|svg|css|js|woff2|ico)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # -------------------------------------------------------------------------
    # Decisao de bypass do cache: NUNCA cachear area logada, admin, checkout.
    # A variavel $skip_cache liga/desliga o cache por requisicao.
    # -------------------------------------------------------------------------
    set $skip_cache 0;

    # nao cacheia metodos que alteram estado nem query strings
    if ($request_method = POST) { set $skip_cache 1; }
    if ($query_string != "")    { set $skip_cache 1; }

    # nao cacheia admin, login, sitemap, area do WordPress
    if ($request_uri ~* "/wp-admin/|/wp-login.php|/xmlrpc.php|sitemap") {
        set $skip_cache 1;
    }

    # nao cacheia usuarios logados, comentaristas ou quem tem item no carrinho
    if ($http_cookie ~* "comment_author|wordpress_logged_in|woocommerce_items_in_cart") {
        set $skip_cache 1;
    }

    # --- Regra de rewrite do WordPress (permalinks bonitos) ------------------
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # --- Encaminhamento do PHP para o worker (LSPHP/PHP-FPM) -----------------
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;

        # aplica a decisao de cache calculada acima
        fastcgi_cache WORDPRESS;
        fastcgi_cache_valid 200 301 302 60m;
        fastcgi_cache_bypass $skip_cache;
        fastcgi_no_cache     $skip_cache;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # --- Seguranca: bloqueia acesso a arquivos sensiveis ---------------------
    location ~ /\.(ht|git) { deny all; }
    location = /wp-config.php { deny all; }
}
